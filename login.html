<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Sky Observation</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/variables.css">
        <link rel="stylesheet" href="css/base.css">
        <link rel="stylesheet" href="css/layout.css">
        <link rel="stylesheet" href="css/main.css">
    </head>

    <body>
        <header class="header grid">
            <div class="container flex__row flex__between">
                <h1>Sky Observation</h1>
            </div>
        </header>

        <main class="container--small content__container">
            <section class="section style__form flex__col">
                <h2 class="section__title text-center">Login</h2>
                <form id="loginForm" class="form__gap flex__col">
                    <div id="loginError" class="error-msg" style="display:none"></div>

                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" class="form__input" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" class="form__input" required>

                    <div class="flex__col flex__center form__gap">
                        <button type="submit" class="button-outline button--fixed-width">Login</button>
                        <p>Don't have an account? <a class="link text-underline" href="register.html">Register</a></p>
                    </div>
                </form>
            </section>
        </main>

        <script src="scripts/db.js"></script>
        <script src="scripts/auth.js"></script>
        <script src="scripts/common.js"></script>
        <script>
            (async () => {
                await loadSampleDataIfEmpty();
                Auth.redirectIfLoggedIn();

                const form = document.getElementById("loginForm");
                const errBox = document.getElementById("loginError");

                form.addEventListener("submit", async (e) => {
                    e.preventDefault();
                    errBox.style.display = "none";
                    try {
                        await Auth.login(form.username.value, form.password.value);
                        const next = getQueryParams().get("next") || "index.html";
                        location.replace(next);
                    } catch (err) {
                        errBox.textContent = err.message;
                        errBox.style.display = "";
                    }
                });
            })();
        </script>
    </body>
</html>
