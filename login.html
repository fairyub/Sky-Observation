<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Sky Observation</title>

	<body>
		<header class="header grid">
            <div class="container flex__row flex__between">
                <h1 class="">Sky Observation</h1>
            </div>
		</header>

            <div class="section style__form flex__col ">

                <form action="/action_page.php" class="form__gap flex__col">
                    <label for="username">Username</label>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password..." class="form__input">
                    
                    <div class="flex__col flex__center form__gap">
                        <a class="button-outline button--fixed-width" href="index.html">Login</a>
                        <p>Don't have an account? <a class="link text-underline" href="register.html">Register</a></p>
                    </div>
                </form>
