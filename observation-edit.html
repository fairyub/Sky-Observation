<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Sky Observation</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/variables.css">
        <link rel="stylesheet" href="css/base.css">
        <link rel="stylesheet" href="css/layout.css">
        <link rel="stylesheet" href="css/main.css">
    </head>

    <body>
        <header class="header grid">
            <div class="container flex__row flex__between">
                <h1>Sky Observation</h1>
                <nav>
                    <ul class="nav">
                        <li class="nav__item"><a href="index.html">Home</a></li>
                        <li class="nav__item active"><a href="observation.html">Observations</a></li>
                        <li class="nav__item"><a href="collection.html">Collections</a></li>
                        <li class="nav__item"><span id="navNickname"></span></li>
                        <li class="nav__item nav__item--button">
                            <button class="button-outline" id="logoutBtn" type="button">Logout</button>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>

        <main class="container content__container">
            <section class="section style__form flex__col">
                <h2 class="section__title text-center">Edit observation</h2>
                <div id="formError" class="error-msg" style="display:none"></div>

                <form id="observationForm" class="form__gap flex__col">
                    <label for="name">Observation name</label>
                    <input type="text" id="name" name="name" class="form__input" required>

                    <label for="description">Description</label>
                    <textarea id="description" name="description" class="form__input" rows="4" required></textarea>

                    <div class="flex__row form__gap">
                        <div class="flex__col form__gap" style="flex:1">
                            <label for="ra">Right Ascension (RA)</label>
                            <input type="text" id="ra" name="ra" class="form__input" required>
                        </div>
                        <div class="flex__col form__gap" style="flex:1">
                            <label for="dec">Declination (Dec)</label>
                            <input type="text" id="dec" name="dec" class="form__input" required>
                        </div>
                    </div>

                    <label for="location">Location name</label>
                    <input type="text" id="location" name="location" class="form__input" required>

                    <div class="flex__row form__gap">
                        <div class="flex__col form__gap" style="flex:1">
                            <label for="latitude">Latitude</label>
                            <input type="text" id="latitude" name="latitude" class="form__input">
                        </div>
                        <div class="flex__col form__gap" style="flex:1">
                            <label for="longitude">Longitude</label>
                            <input type="text" id="longitude" name="longitude" class="form__input">
                        </div>
                    </div>

                    <label for="observed-at">Date observed</label>
                    <input type="date" id="observed-at" name="observed-at" class="form__input">

                    <label for="update-reason">Update reason (optional)</label>
                    <input type="text" id="update-reason" name="update-reason" placeholder="e.g. corrected coordinates" class="form__input">

                    <div class="flex__row flex__end form__gap">
                        <a class="button-outline button--fixed-width" href="observation.html">Cancel</a>
                        <button class="button-color button--fixed-width" type="submit">Save</button>
                    </div>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Sky Observation</p>
        </footer>

        <script src="scripts/db.js"></script>
        <script src="scripts/auth.js"></script>
        <script src="scripts/common.js"></script>
        <script src="scripts/observation-form.js"></script>
        <script>
            (async () => {
                await loadSampleDataIfEmpty();
                if (!Auth.requireLogin()) return;
                setupHeaderForCurrentUser();
                initObservationForm({ mode: "edit" });
            })();
        </script>
    </body>
</html>
