<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Sky Observation</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/variables.css">
        <link rel="stylesheet" href="css/base.css">
        <link rel="stylesheet" href="css/layout.css">
        <link rel="stylesheet" href="css/main.css">
    </head>

    <body>
        <header class="header grid">
            <div class="container flex__row flex__between">
                <h1>Sky Observation</h1>
                <nav>
                    <ul class="nav">
                        <li class="nav__item"><a href="index.html">Home</a></li>
                        <li class="nav__item active"><a href="observation.html">Observations</a></li>
                        <li class="nav__item"><a href="collection.html">Collections</a></li>
                        <li class="nav__item"><span id="navNickname"></span></li>
                        <li class="nav__item nav__item--button">
                            <button class="button-outline" id="logoutBtn" type="button">Logout</button>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>

        <main class="container content__container flex__row flex__between">
            <!-- FILTER -->
            <aside class="flex__col left__sidebar flex__start">
                <div class="section style__form flex__col">
                    <h3>Filters</h3>
                    <form id="filterForm" class="form__gap flex__col">
                        <label for="name">Search by name or ID</label>
                        <input type="text" id="name" name="name" placeholder="observation name or ID..." class="form__input">

                        <label for="from-date">Date range</label>
                        <input type="date" id="from-date" name="from-date" class="form__input">
                        <input type="date" id="to-date" name="to-date" class="form__input">

                        <label for="owner">Owner nickname</label>
                        <input type="text" id="owner" name="owner" placeholder="nickname..." class="form__input">

                        <div class="flex__row flex__center" style="gap:1rem">
                            <button type="submit" class="button-color">Apply</button>
                            <button type="button" id="clearFilters" class="button-outline">Clear</button>
                        </div>
                    </form>
                </div>
                <a class="button-outline full-width" href="observation-create.html">Add Observation</a>
            </aside>

            <!-- LIST -->
            <section class="flex__col right-side__content">
                <div id="observationList" class="observation__rectangle__box__list flex__col"></div>
                <p id="emptyMessage" class="muted" style="display:none">No observations match these filters.</p>
            </section>
        </main>

        <!-- Observation row template -->
        <template id="observationRowTemplate">
            <article class="section observation__rectangle__box__item observation__item">
                <a class="observation__card__link row-link" href="#" style="display:flex; gap:1rem;">
                    <img src="media/images/banner.jpg" class="observation__item__image">
                    <div class="observation__item__content flex__col flex__between">
                        <div class="observation__item__body flex__col">
                            <h3>
                                <span class="row-name"></span>
                                <span class="edited-tag row-edited" style="display:none">edited</span>
                            </h3>
                            <p class="row-desc"></p>
                            <div class="flex__row observation__item--location">
                                <div class="observation__item--location--detail flex__row">
                                    <span>RA</span> <span class="row-ra"></span>
                                </div>
                                <div class="observation__item--location--detail flex__row">
                                    <span>Dec</span> <span class="row-dec"></span>
                                </div>
                                <div class="observation__item--location--detail flex__row row-loc"></div>
                            </div>
                        </div>
                        <div class="observation__item__footer flex__row flex__between">
                            <div class="flex__row" style="gap:0.4rem">
                                <span>by @<span class="row-owner"></span></span>
                                <span>·</span>
                                <span class="row-date"></span>
                            </div>
                            <span class="muted"><span class="row-views">0</span> views</span>
                        </div>
                    </div>
                </a>
            </article>
        </template>

        <footer>
            <p>&copy; 2026 Sky Observation</p>
        </footer>

        <script src="scripts/db.js"></script>
        <script src="scripts/auth.js"></script>
        <script src="scripts/common.js"></script>
        <script src="scripts/observation.js"></script>
        <script>
            (async () => {
                await loadSampleDataIfEmpty();
                if (!Auth.requireLogin()) return;
                setupHeaderForCurrentUser();
                await loadObservations();
            })();
        </script>
    </body>
</html>
